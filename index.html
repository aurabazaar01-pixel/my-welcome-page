<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Stay Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            /* 1. 全局禁止文字选择：让页面看起来像一个整体，不可拖选文字 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* 背景层：维持 source: 4 逻辑 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* 左上角字母 Logo */
        .top-left-logo {
            position: absolute;
            top: 60px; 
            left: 140px; 
            width: 180px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            z-index: 2;
            /* 2. 禁止图片被拖拽或右键保存（部分移动端） */
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 中心图形 Logo */
        .center-logo {
            width: 480px;
            margin-bottom: 35px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            animation: fadeInDown 1.5s ease-out;
            /* 禁止图片选择/拖拽 */
            pointer-events: none;
            -webkit-user-drag: none;
        }
        .center-logo img { width: 100%; display: block; }

        /* AURA IS COMING */
        .status-text {
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 1.2em; 
            text-transform: uppercase;
            margin-bottom: 10px; 
            padding-left: 1.2em;
            opacity: 0.95;
        }

        /* 电脑版：维持拉长效果 */
        .footer-slogan {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1.4em; 
            text-transform: lowercase;
            padding-left: 1.4em;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配：锁定 source: 4 效果[cite: 4] */
        @media (max-width: 768px) {
            .top-left-logo { 
                top: 30px; 
                left: 30px; 
                width: 90px; 
                opacity: 0.95; 
            }
            .center-logo { width: 180px; margin-bottom: 20px; }
            .status-text { 
                font-size: 1rem; 
                letter-spacing: 0.4em; 
                padding-left: 0.4em;
                margin-bottom: 6px;
                width: 100%;
            }
            .footer-slogan { 
                font-size: 0.65rem; 
                letter-spacing: 0.25em; 
                padding-left: 0.25em;
                width: 90%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;"> <!-- 3. 禁止右键和禁止拖拽 -->

    <div class="background"></div>
    <div class="overlay"></div>

    <img src="letter-logo.png" alt="Aura Logo" class="top-left-logo">

    <div class="main-container">
        <div class="center-logo">
            <img src="logo.png" alt="Aura Graphics Logo">
        </div>

        <div class="status-text">
            AURA IS COMING
        </div>

        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Coming Soon</title>
    <!-- 使用免费商用的 Google Fonts: Montserrat (300细体, 400常规) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            /* 优先使用 Montserrat，后备使用系统免检无衬线字体 */
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 左上角品牌文本 */
        .brand-name {
            position: absolute;
            top: 40px;
            left: 50px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #000;
            opacity: 0.8;
        }

        .main-wrapper {
            text-align: center;
            margin-top: -5vh; 
            animation: fadeIn 2s ease-out;
        }

        /* Logo 组合区域 */
        .logo-group {
            margin-bottom: 55px; /* 控制 Logo 组与下方文字的距离 */
        }

        /* 眼镜 Logo 容器 */
        .logo-container {
            width: 260px; 
            margin: 0 auto 20px auto; /* 与下方字母 Logo 保持 20px 间距 */
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 字母 Logo 容器 */
        .letter-logo {
            width: 250px; /* 字母 Logo 建议稍微小一点，形成视觉层级 */
            margin: 0 auto;
            opacity: 0.95;
        }

        .letter-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 主标题 COMING SOON */
        h1 {
            font-size: 1.7rem; 
            font-weight: 400;
            letter-spacing: 2.2em;
            margin: 0;
            text-transform: uppercase;
            color: #000;
            padding-left: 2.2em; 
            white-space: nowrap;
        }

        /* 副标题 STAY TUNED... */
        .sub-text {
            font-size: 1.05rem; 
            font-weight: 300; /* 调细字重以拉开对比 */
            letter-spacing: 1.5em;
            margin-top: 22px; /* 紧凑间距 */
            text-transform: uppercase;
            color: #666;
            padding-left: 1.5em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态点动画 */
        .dots {
            display: inline-block;
            width: 4em;
            text-align: left;
            margin-left: -0.8em;
            font-weight: 400;
        }

        .dots::after {
            content: '';
            animation: dotCycle 2s steps(1, end) infinite;
        }

        @keyframes dotCycle {
            0%   { content: ''; }
            14%  { content: '.'; }
            28%  { content: '..'; }
            42%  { content: '...'; }
            56%  { content: '....'; }
            70%  { content: '.....'; }
            84%  { content: '......'; }
            100% { content: ''; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .brand-name { top: 20px; left: 25px; font-size: 0.7rem; }
            .logo-container { width: 180px; }
            .letter-logo { width: 65px; }
            h1 { font-size: 1.1rem; letter-spacing: 1.1em; padding-left: 1.1em; }
            .sub-text { font-size: 0.75rem; letter-spacing: 0.75em; padding-left: 0.75em; }
        }
    </style>
</head>
<body>

    <!-- 左上角标识 -->
    <div class="brand-name">Aura</div>

    <div class="main-wrapper">
        <div class="logo-group">
            <!-- 第一个 Logo: 眼镜 -->
            <div class="logo-container">
                <img src="logo.png" alt="Aura Graphics Logo">
            </div>
            
            <!-- 第二个 Logo: 字母 -->
            <div class="letter-logo">
                <img src="letter-logo.png" alt="Aura Letter Logo">
            </div>
        </div>
        
        <h1>COMING SOON</h1>
        <div class="sub-text">
            STAY TUNED<span class="dots"></span>
        </div>
    </div>

</body>
</html>

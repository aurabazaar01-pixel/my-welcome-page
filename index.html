<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Stay Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* 背景层 - 保持 source: 3 的层级逻辑确保可见 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* 左上角字母 Logo - 根据标注图：更靠左、更靠上 */
        .top-left-logo {
            position: absolute;
            top: 60px; /* 精确像素定位控制 */
            left: 140px; 
            width: 130px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            z-index: 2;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 中心图形 Logo */
        .center-logo {
            width: 480px;
            margin-bottom: 35px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            animation: fadeInDown 1.5s ease-out;
        }
        .center-logo img { width: 100%; display: block; }

        /* AURA IS COMING */
        .status-text {
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 1.2em; /* 保持极宽间距 */
            text-transform: uppercase;
            margin-bottom: 10px; /* 进一步收紧与下方口号的距离 */
            padding-left: 1.2em;
            opacity: 0.95;
        }

        /* stay simple stay true - 字体排列宽点 */
        .footer-slogan {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.8em; /* 显著增加字间距，响应“排列宽点”的要求 */
            text-transform: lowercase;
            padding-left: 0.8em;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .top-left-logo { top: 20px; left: 20px; width: 60px; }
            .center-logo { width: 180px; margin-bottom: 20px; }
            
            /* 手机版保持 AURA IS COMING 宽过下方口号 */
            .status-text { 
                font-size: 0.95rem; 
                letter-spacing: 0.5em; 
                padding-left: 0.5em;
                margin-bottom: 6px;
                width: 95%;
            }
            .footer-slogan { 
                font-size: 0.65rem; 
                letter-spacing: 0.25em; 
                padding-left: 0.25em;
                width: 85%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <!-- 左上角字母 Logo -->
    <img src="letter-logo.png" alt="Aura Logo" class="top-left-logo">

    <div class="main-container">
        <!-- 中心 Logo -->
        <div class="center-logo">
            <img src="logo.png" alt="Aura Graphics Logo">
        </div>

        <!-- 主状态文案 -->
        <div class="status-text">
            AURA IS COMING
        </div>

        <!-- 底部口号 -->
        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

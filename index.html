<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Stay Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
            /* 增加一个和背景图相近的深灰色，减少白屏或黑屏闪烁感 */
            background-color: #1a1a1a; 
        }

        /* 背景层 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 优化：增加 linear-gradient 预加载颜色，在图片出来前先有颜色填充 */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            /* 增加淡入动画，让背景出来时更平滑，不显得突兀 */
            animation: fadeIn 2s ease-in;
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* 左上角字母 Logo - 电脑版维持 source: 4 设置 */
        .top-left-logo {
            position: absolute;
            top: 60px; 
            left: 140px; 
            width: 130px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            z-index: 2;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 中心图形 Logo */
        .center-logo {
            width: 480px;
            margin-bottom: 35px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            animation: fadeInDown 1.5s ease-out;
        }
        .center-logo img { width: 100%; display: block; }

        /* AURA IS COMING */
        .status-text {
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 1.2em; 
            text-transform: uppercase;
            margin-bottom: 10px; 
            padding-left: 1.2em;
            opacity: 0.95;
        }

        /* stay simple stay true */
        .footer-slogan {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.8em; 
            text-transform: lowercase;
            padding-left: 0.8em;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 移动端适配优化 */
        @media (max-width: 768px) {
            /* 1. 调大手机版字母 Logo：width 从 60px 增加到 90px，位置微调 */
            .top-left-logo { 
                top: 30px; 
                left: 30px; 
                width: 90px; 
                opacity: 0.95; /* 增加一点对比度 */
            }
            
            .center-logo { width: 180px; margin-bottom: 20px; }
            
            .status-text { 
                font-size: 1rem; /* 稍微调大一点点手机字号 */
                letter-spacing: 0.4em; 
                padding-left: 0.4em;
                margin-bottom: 6px;
                width: 100%;
            }
            .footer-slogan { 
                font-size: 0.65rem; 
                letter-spacing: 0.2em; 
                padding-left: 0.2em;
                width: 90%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <img src="letter-logo.png" alt="Aura Logo" class="top-left-logo">

    <div class="main-container">
        <div class="center-logo">
            <img src="logo.png" alt="Aura Graphics Logo">
        </div>

        <div class="status-text">
            AURA IS COMING
        </div>

        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

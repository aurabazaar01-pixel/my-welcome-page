<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Stay Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
            background-color: #000;
        }

        /* 基础背景图 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -3;
        }

        /* 整体调色遮罩 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -2;
        }

        /* 磨砂玻璃效果层：只模糊外侧 */
        .frosted-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
            /* 创建中间透明的“孔”，调整百分比可改变清晰区域大小 */
            clip-path: polygon(
                0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 
                8% 8%, 8% 92%, 92% 92%, 92% 8%, 8% 8%
            );
        }

        /* 可视范围边框线 */
        .border-line {
            position: fixed;
            top: 8%; left: 8%; right: 8%; bottom: 8%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        /* 内容容器 */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8%;
        }

        /* 左上角字母 Logo */
        .top-left-logo {
            position: absolute;
            top: 11%;
            left: 11%;
            width: 170px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }

        /* 中心 Logo：缩小尺寸 */
        .center-logo {
            width: 450px; /* 从 480px 缩小 */
            margin-bottom: 30px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            animation: fadeInDown 1.5s ease-out;
        }

        .center-logo img { width: 100%; display: block; }

        /* AURA IS COMING：缩小字体和间距 */
        .status-text {
            font-size: 3.5rem; /* 从 3.4rem 缩小 */
            font-weight: 600;
            letter-spacing: 0.5em; /* 缩小字间距 */
            text-transform: uppercase;
            margin-bottom: 40px;
            padding-left: 0.5em;
            opacity: 0.8;
        }

        /* 底部口号：改为横向排列 */
        .footer-slogan {
            font-size: 1.3rem;
            font-weight: 100;
            letter-spacing: 0.2em;
            text-transform: lowercase;
            opacity: 0.6;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .frosted-frame { clip-path: none; backdrop-filter: blur(5px); }
            .border-line { top: 5%; left: 5%; right: 5%; bottom: 5%; }
            .top-left-logo { top: 7%; left: 7%; width: 40px; }
            .center-logo { width: 160px; }
            .status-text { font-size: 0.8rem; letter-spacing: 0.3em; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>
    <div class="frosted-frame"></div>
    <div class="border-line"></div>

    <div class="main-container">
        <!-- 左上角字母 Logo -->
        <img src="letter-logo.png" alt="Aura Icon" class="top-left-logo">

        <!-- 中心眼镜 Logo -->
        <div class="center-logo">
            <img src="logo.png" alt="Aura Graphics Logo">
        </div>

        <!-- 状态文案 -->
        <div class="status-text">
            AURA IS COMING
        </div>

        <!-- 横向口号 -->
        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

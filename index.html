<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- 新修改：左上角字母 Logo 样式 --- */
        .brand-logo-top {
            position: absolute;
            top: 40px;    /* 距离顶部距离 */
            left: 50px;   /* 距离左侧距离 */
            width: 200px;  /* 字母 Logo 的宽度，可根据需要调整 */
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .brand-logo-top:hover {
            opacity: 1;
        }

        .brand-logo-top img {
            width: 100%;
            display: block;
        }

        .main-wrapper {
            text-align: center;
            margin-top: -5vh; 
            animation: fadeIn 2s ease-out;
        }

        /* 中央大 Logo 区域 */
        .logo-container {
            width: 260px; 
            margin: 0 auto 50px auto; 
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 1.7rem; 
            font-weight: 400;
            letter-spacing: 2.2em;
            margin: 0;
            text-transform: uppercase;
            color: #000;
            padding-left: 2.2em; 
            white-space: nowrap;
        }

        .sub-text {
            font-size: 1.05rem; 
            font-weight: 300;
            letter-spacing: 1.5em;
            margin-top: 22px;
            text-transform: uppercase;
            color: #666;
            padding-left: 1.5em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dots {
            display: inline-block;
            width: 4em;
            text-align: left;
            margin-left: -0.8em;
            font-weight: 400;
        }

        .dots::after {
            content: '';
            animation: dotCycle 2s steps(1, end) infinite;
        }

        @keyframes dotCycle {
            0%   { content: ''; }
            14%  { content: '.'; }
            28%  { content: '..'; }
            42%  { content: '...'; }
            56%  { content: '....'; }
            70%  { content: '.....'; }
            84%  { content: '......'; }
            100% { content: ''; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .brand-logo-top { 
                top: 25px; 
                left: 25px; 
                width: 50px; /* 手机端缩小字母 Logo */
            }
            .logo-container { width: 180px; }
            h1 { font-size: 1.1rem; letter-spacing: 1.1em; padding-left: 1.1em; }
            .sub-text { font-size: 0.75rem; letter-spacing: 0.75em; padding-left: 0.75em; }
        }
    </style>
</head>
<body>

    <!-- 左上角字母 Logo (替换了原来的文本) -->
    <div class="brand-logo-top">
        <img src="letter-logo.png" alt="Aura Brand Icon">
    </div>

    <div class="main-wrapper">
        <!-- 中央只保留眼镜 Logo -->
        <div class="logo-container">
            <img src="logo.png" alt="Aura Main Logo">
        </div>
        
        <h1>COMING SOON</h1>
        <div class="sub-text">
            STAY TUNED<span class="dots"></span>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* 基础背景层 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 重点：本地测试建议使用相对路径，确保图片就在 HTML 旁边 */
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -3;
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -2;
        }

        /* 模拟磨砂边框：使用巨大的内发光阴影替代 clip-path */
        .frame-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px 50px rgba(0,0,0,0.5); /* 黑色渐变边框 */
            pointer-events: none;
            z-index: -1;
        }

        /* 可视边框线 */
        .visual-border {
            position: fixed;
            top: 8%; left: 8%; right: 8%; bottom: 8%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 左上角字母 Logo */
        .top-left-logo {
            position: absolute;
            top: 11%; left: 11%;
            width: 45px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }

        /* 中心大 Logo */
        .center-logo {
            width: 200px;
            margin-bottom: 25px;
            filter: brightness(0) invert(1);
            animation: fadeInDown 1.5s ease-out;
        }

        /* AURA IS COMING：三行大字体 */
        .status-text {
            font-size: 2.8rem;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 35px;
            opacity: 0.95;
        }
        .status-text span { display: block; }

        /* 横向排列 Slogan */
        .footer-slogan {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            opacity: 0.7;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="overlay"></div>
    <div class="frame-effect"></div>
    <div class="visual-border"></div>

    <div class="main-content">
        <img src="letter-logo.png" alt="Icon" class="top-left-logo">

        <div class="center-logo">
            <img src="logo.png" alt="Aura Logo" style="width:100%;">
        </div>

        <div class="status-text">
            <span>AURA</span>
            <span>IS</span>
            <span>COMING</span>
        </div>

        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

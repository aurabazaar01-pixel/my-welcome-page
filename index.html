<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Stay Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            /* 全局禁止文字选择 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* 背景层[cite: 4, 6] */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* 左上角字母 Logo[cite: 6] */
        .top-left-logo {
            position: absolute;
            top: 60px; 
            left: 140px; 
            width: 180px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            z-index: 2;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 中心图形 Logo[cite: 6] */
        .center-logo {
            width: 300px;
            margin-bottom: 35px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
            animation: fadeInDown 1.5s ease-out;
            pointer-events: none;
            -webkit-user-drag: none;
        }
        .center-logo img { width: 100%; display: block; }

        /* 修改文案：Hang tight, we are coming[cite: 6] */
        .status-text {
            font-size: 3.5rem; /* 文案缩短，字号回升 */
            font-weight: 600;
            letter-spacing: 0.3em; /* 重新拉开间距，增强视觉延伸感 */
            text-transform: uppercase;
            margin-bottom: 10px; 
            padding-left: 1.1em;
            opacity: 0.90;
        }

        /* 底部口号[cite: 6] */
        .footer-slogan {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1.4em; 
            text-transform: lowercase;
            padding-left: 1.4em;
            opacity: 0.9;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配[cite: 4, 6] */
        @media (max-width: 768px) {
            .top-left-logo { 
                top: 30px; 
                left: 30px; 
                width: 90px; 
            }
            .center-logo { width: 180px; margin-bottom: 20px; }
            .status-text { 
                font-size: 0.9rem; 
                letter-spacing: 0.35em; 
                padding-left: 0.35em;
                width: 95%;
            }
            .footer-slogan { 
                font-size: 0.65rem; 
                letter-spacing: 0.25em; 
                padding-left: 0.25em;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

    <div class="background"></div>
    <div class="overlay"></div>

    <img src="letter-logo.png" alt="Aura Logo" class="top-left-logo">

    <div class="main-container">
        <div class="center-logo">
            <img src="logo.png" alt="Aura Graphics Logo">
        </div>

        <div class="status-text">
            Hang tight, we are coming
        </div>

        <div class="footer-slogan">
            stay simple stay true
        </div>
    </div>

</body>
</html>

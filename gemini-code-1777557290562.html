<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <!-- 引入 300(细体) 和 400(常规) 两种字重 -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            text-align: center;
            margin-top: -5vh; 
            animation: fadeIn 2s ease-out;
        }

        /* 针对你的新 Logo 调整容器 */
        .logo-container {
            width: 280px; /* 适当加大以展示眼镜 Logo 的细节 */
            height: auto;
            margin: 0 auto 60px auto; /* 调整与文字的留白 */
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 主标题：COMING SOON */
        h1 {
            font-size: 1.7rem; 
            font-weight: 400;
            letter-spacing: 2.2em;
            margin: 0;
            text-transform: uppercase;
            color: #000;
            padding-left: 2.2em; 
            white-space: nowrap;
        }

        /* 副标题：STAY TUNED... */
        .sub-text {
            font-size: 1.05rem; 
            font-weight: 300;
            letter-spacing: 1.5em;
            margin-top: 25px; /* 紧凑间距 */
            text-transform: uppercase;
            color: #666;
            padding-left: 1.5em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态省略号动效 */
        .dots {
            display: inline-block;
            width: 4em;
            text-align: left;
            margin-left: -0.8em;
            font-weight: 400;
        }

        .dots::after {
            content: '';
            animation: dotCycle 2s steps(1, end) infinite;
        }

        @keyframes dotCycle {
            0%   { content: ''; }
            14%  { content: '.'; }
            28%  { content: '..'; }
            42%  { content: '...'; }
            56%  { content: '....'; }
            70%  { content: '.....'; }
            84%  { content: '......'; }
            100% { content: ''; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <!-- 请将你的图片保存为 logo.png 并上传到 GitHub 仓库 -->
            <img src="logo.png" alt="Brand Logo">
        </div>
        
        <h1>COMING SOON</h1>
        <div class="sub-text">
            STAY TUNED<span class="dots"></span>
        </div>
    </div>

</body>
</html>
